name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install --quiet pypdf reportlab markdown

      - name: Validate skill structure
        run: python3 scripts/validate_skill.py . --skip-git

      - name: Unit tests
        run: python3 scripts/test_a_stock_data.py
